<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clariti - Academic Management System</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/tables.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <svg width="65" height="65" viewBox="0 0 65 65" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="24.6715" width="18.5036" height="64.5256" rx="9.25182" fill="#6366F1" />
                    <rect width="43.1752" height="18.5036" rx="9.25182" fill="#6366F1" />
                    <circle cx="55.7482" cy="9.25182" r="9.25182" fill="#6366F1" />
                </svg>
            </div>
            <h1>Clariti</h1>
            <p class="login-subtitle">Academic Management System</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
            <div class="demo-credentials">
                <p><strong>Demo Credentials:</strong></p>
                <p><strong>Admin:</strong> admin@edu.com / admin123</p>
                <p><strong>HeadMaster:</strong> headmaster@edu.com / hm123</p>
                <p><strong>Teacher:</strong> teacher@edu.com / teacher123</p>
                <p><strong>Student:</strong> student@edu.com / student123</p>
            </div>
        </div>
    </div>

    <!-- Main Application -->
    <div id="mainApp" class="app-container" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="40" height="40" viewBox="0 0 65 65" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="24.6715" width="18.5036" height="64.5256" rx="9.25182" fill="white" />
                        <rect width="43.1752" height="18.5036" rx="9.25182" fill="white" />
                        <circle cx="55.7482" cy="9.25182" r="9.25182" fill="white" />
                    </svg>
                    <span class="logo-text">Clariti</span>
                </div>
            </div>

            <div class="sidebar-user">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-info">
                    <div class="user-name" id="userName">Admin User</div>
                    <div class="user-email" id="userEmail">admin@edu.com</div>
                </div>
            </div>

            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Navigation items will be populated dynamically based on role -->
            </nav>

            <div class="sidebar-footer">
                <button class="nav-item" onclick="logout()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="mobile-menu-toggle" onclick="toggleSidebar()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="mobile-logo-header">
                    <svg width="26" height="26" viewBox="0 0 65 65" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="24.6715" width="18.5036" height="64.5256" rx="9.25182" fill="#6366F1" />
                        <rect width="43.1752" height="18.5036" rx="9.25182" fill="#6366F1" />
                        <circle cx="55.7482" cy="9.25182" r="9.25182" fill="#6366F1" />
                    </svg>
                    <span class="logo-text">Clariti</span>
                </div>
            </header>

            <div id="contentArea" class="content-area">
                <!-- Content will be loaded dynamically -->
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Modal Container -->
    <div id="modalContainer"></div>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/schools.js"></script>
    <script src="js/users.js"></script>
    <script src="js/students.js"></script>
    <script src="js/teachers.js"></script>
    <script src="js/courses.js"></script>
    <script src="js/schedules.js"></script>
    <script src="js/assignments.js"></script>
    <script src="js/submissions.js"></script>
    <script src="js/grading.js"></script>
    <script src="js/forums.js"></script>
    <script src="js/scores.js"></script>
    <script src="js/calendar.js"></script>
</body>

</html>
